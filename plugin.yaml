name: hermes-lark-streaming
version: "0.10.0"
description: "Feishu/Lark CardKit v2.0 streaming cards for Hermes Agent — real-time AI response display with typing effect, tool panels, reasoning, and more"
author: Aowen-Nowor
kind: standalone
provides_hooks:
  - on_feishu_normalize
  - on_message_started
  - on_message_completed
  - on_message_aborted
  - on_message_interrupted
  - on_answer_delta
  - on_thinking_delta
  - on_reasoning_delta
  - on_tool_updated
  - on_background_review_message
  - on_cron_deliver
