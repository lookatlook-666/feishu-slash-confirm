name: Sync from Gitee

on:
  schedule:
    - cron: '44 * * * *'
  workflow_dispatch:
    inputs:
      force_tests:
        description: '强制运行测试（即使无变更）'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "gitee-sync"
          git config user.email "sync@example.com"

      - name: Record pre-sync SHA
        id: pre_sync
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Sync from Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}.git
          git fetch gitee

          BRANCH=$(git branch --show-current)
          git checkout "$BRANCH"

          # 冲突时以 Gitee 为准
          if ! git merge gitee/master --no-edit --strategy-option theirs; then
            echo "⚠️ Merge failed, forcing Gitee version"
            git merge --abort
            git reset --hard gitee/master
          fi

          git push origin "$BRANCH"

      - name: Detect changes
        id: detect
        run: |
          SHA_BEFORE="${{ steps.pre_sync.outputs.sha }}"
          SHA_AFTER=$(git rev-parse HEAD)
          if [ "$SHA_BEFORE" != "$SHA_AFTER" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --name-only "$SHA_BEFORE" "$SHA_AFTER" > changed_files.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        id: run_tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test_report.xml 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Notify Feishu
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          TRIGGER: ${{ github.event_name }}
          FORCE: ${{ inputs.force_tests || 'false' }}
        run: python3 scripts/notify_feishu.py